<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizard Game — Roguelike Progression</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    .nav {
      text-align: center;
      padding: 6px;
      background: #12121f;
      border-bottom: 1px solid #1a1a2a;
      flex-shrink: 0;
    }
    .nav a { color: #7ab8f5; text-decoration: none; font-size: 11px; margin: 0 8px; }
    .nav a:hover { text-decoration: underline; }

    #error {
      display: none;
      background: #3b1a1a;
      border: 1px solid #E74C3C;
      color: #f5a5a5;
      padding: 16px 20px;
      border-radius: 8px;
      text-align: center;
      margin: 20px;
      font-size: 14px;
    }

    #loading {
      text-align: center;
      padding: 60px;
      color: #666;
      font-size: 16px;
    }

    .app {
      display: none;
      height: calc(100vh - 30px);
    }

    /* === CONTROLS === */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #0a0a15;
      border-bottom: 1px solid #1a1a2a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .controls .stats {
      margin-left: auto;
      font-size: 12px;
      color: #666;
    }

    .toggle-group {
      display: flex;
      gap: 2px;
      background: #1a1a2e;
      border-radius: 6px;
      padding: 2px;
    }

    .toggle-btn {
      padding: 4px 12px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn.active { background: #2a2a4a; color: #fff; }
    .toggle-btn:hover:not(.active) { color: #bbb; }

    .search-input {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      width: 160px;
    }
    .search-input::placeholder { color: #555; }

    /* === BODY === */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: #12121f;
      border-right: 1px solid #2a2a3a;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-section h2 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #1a1a2a;
    }

    /* Meta-unlock cards */
    .layer-section { margin-bottom: 12px; }
    .layer-header {
      font-size: 11px;
      font-weight: 600;
      color: #F39C12;
      padding: 4px 0;
      cursor: pointer;
    }
    .layer-header:hover { color: #F5B041; }
    .layer-header .arrow { font-size: 10px; margin-right: 4px; transition: transform 0.15s; display: inline-block; }
    .layer-header.collapsed .arrow { transform: rotate(-90deg); }
    .layer-contents.collapsed { display: none; }

    .meta-card {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-left: 3px solid #F39C12;
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 6px;
      font-size: 11px;
    }
    .meta-card-name { font-weight: 600; color: #e0e0e0; margin-bottom: 2px; }
    .meta-card-desc { color: #888; margin-bottom: 3px; }
    .meta-card-badge {
      display: inline-block;
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-right: 4px;
    }
    .badge-type_branch  { background: #1a3a1a; color: #5dde5d; }
    .badge-secondary    { background: #3a3a1a; color: #dede5d; }
    .badge-tertiary     { background: #3a1a3a; color: #de5dde; }
    .badge-augmenter    { background: #1a1a3a; color: #5d5dde; }
    .badge-character    { background: #3a1a1a; color: #de5d5d; }
    .badge-upgrade      { background: #1a3a3a; color: #5ddede; }

    .meta-card-conditions { color: #666; font-size: 10px; margin-top: 2px; }
    .meta-card-reveals { color: #555; font-size: 10px; margin-top: 2px; }

    /* Tables */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .data-table th {
      text-align: left;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      padding: 4px 6px;
      border-bottom: 1px solid #2a2a3a;
    }
    .data-table td {
      padding: 5px 6px;
      border-bottom: 1px solid #1a1a2a;
      color: #aaa;
    }
    .data-table tr:hover td { background: #1a1a2e; }
    .cost-insight { color: #F4D03F; font-weight: 600; }
    .cost-material { color: #27AE60; font-weight: 600; }
    .mastery-level-num { color: #F39C12; font-weight: 700; font-size: 14px; }

    /* === TREE === */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tree-container {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: auto;
      padding: 16px;
    }

    .type-column {
      flex: 0 0 300px;
      min-width: 280px;
    }

    .type-header {
      text-align: center;
      padding: 8px 14px;
      margin: 0 6px 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .type-header .subtitle {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      opacity: 0.7;
      margin-top: 2px;
    }

    .node-list {
      padding: 0 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .branch-label {
      font-size: 10px;
      color: #F39C12;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 10px 3px;
      border-top: 1px dashed #2a2a1a;
      margin-top: 6px;
    }
    .branch-label:first-child { border-top: none; margin-top: 0; }

    .tier-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 10px 2px;
    }

    /* === NODES === */
    .node {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 8px 12px;
      position: relative;
      overflow: hidden;
    }

    .node.meta-gated {
      opacity: 0.55;
      border-style: dashed;
      border-color: #5a4a20;
    }

    .node.gate-node {
      border-color: #8a6a20;
      border-width: 2px;
    }

    .node-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .node-category {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .cat-starter    { background: #1a3a3a; color: #5ddede; }
    .cat-energy     { background: #1a3a1a; color: #5dde5d; }
    .cat-spell_pool { background: #1a1a3a; color: #5d5dde; }
    .cat-passive    { background: #3a3a1a; color: #dede5d; }
    .cat-gate       { background: #3a2a1a; color: #dea05d; }
    .cat-discovery  { background: #3a1a3a; color: #de5dde; }

    .node-name {
      font-weight: 600;
      font-size: 13px;
      flex: 1;
    }

    .node-desc {
      font-size: 11px;
      color: #888;
      line-height: 1.3;
    }

    .node-flavor {
      font-size: 10px;
      color: #555;
      font-style: italic;
      margin-top: 3px;
    }

    .node-meta {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .node-cost {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: #0f0f1a;
      border: 1px solid #2a2a3a;
      font-variant-numeric: tabular-nums;
    }

    .node-prereq {
      font-size: 10px;
      color: #666;
      margin-top: 3px;
    }

    .node-effects {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .node-effect { font-size: 10px; color: #6a6; }
    .node-effect.unlock-effect { color: #da5; font-weight: 600; }
    .node-effect.spell-effect { color: #5ad; }

    .node-visibility {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      position: absolute;
      top: 8px;
      right: 10px;
    }
    .vis-always { background: #1a2a1a; color: #5a8a5a; }
    .vis-meta { background: #2a2a1a; color: #F39C12; }

    .gate-reqs {
      margin-top: 5px;
      padding: 4px 8px;
      background: #1a1a10;
      border: 1px solid #3a3a1a;
      border-radius: 4px;
      font-size: 10px;
      color: #dea05d;
    }
    .gate-reqs strong { color: #F39C12; }

    .meta-unlock-badge {
      font-size: 9px;
      color: #F39C12;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="./" style="color:#F4D03F">&larr; Design Tools</a> &middot;
    <a href="counters.html">Counter Matrix</a>
    <a href="combinations.html">Combinations</a>
    <a href="effects.html">Effect Space</a>
    <a href="schools.html">Wizard Schools</a>
    <a href="equipment.html">Instruments</a>
    <a href="progression.html">Incremental Tree</a>
  </div>

  <div id="error"></div>
  <div id="loading">Loading roguelike progression...</div>

  <div class="app" id="app">
    <div class="controls">
      <div class="toggle-group" id="view-toggles">
        <button class="toggle-btn active" data-view="all">All</button>
        <button class="toggle-btn" data-view="always">Always Visible</button>
        <button class="toggle-btn" data-view="meta">Meta-Gated</button>
      </div>
      <div class="toggle-group" id="type-filters"></div>
      <input type="text" class="search-input" id="search" placeholder="Search nodes...">
      <span class="stats" id="stats"></span>
    </div>

    <div class="app-body">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <h2>Meta-Progression Unlocks</h2>
          <div id="meta-panel"></div>
        </div>
        <div class="sidebar-section">
          <h2>Research Desk</h2>
          <div id="research-section"></div>
        </div>
        <div class="sidebar-section">
          <h2>Mastery Levels</h2>
          <div id="mastery-section"></div>
        </div>
      </aside>

      <main class="main">
        <div class="tree-container" id="tree"></div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1/dist/sql-wasm.js"></script>
  <script src="roguelike-progression.js"></script>
</body>
</html>
