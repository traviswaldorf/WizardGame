<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizard Game — Progression Tree</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    .nav {
      text-align: center;
      padding: 6px;
      background: #12121f;
      border-bottom: 1px solid #1a1a2a;
      flex-shrink: 0;
    }
    .nav a { color: #7ab8f5; text-decoration: none; font-size: 11px; margin: 0 8px; }
    .nav a:hover { text-decoration: underline; }

    #error {
      display: none;
      background: #3b1a1a;
      border: 1px solid #E74C3C;
      color: #f5a5a5;
      padding: 16px 20px;
      border-radius: 8px;
      text-align: center;
      margin: 20px;
      font-size: 14px;
    }

    #loading {
      text-align: center;
      padding: 60px;
      color: #666;
      font-size: 16px;
    }

    /* === APP SHELL === */
    .app {
      display: none; /* shown after load */
      height: calc(100vh - 30px);
    }

    /* === RESOURCE BAR (top) === */
    .resource-bar {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      background: #0a0a15;
      border-bottom: 1px solid #2a2a3a;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .resource-card {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 8px 16px;
      min-width: 170px;
      border-left: 3px solid #888;
    }

    .resource-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }

    .resource-amount {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .resource-rate {
      font-size: 11px;
      opacity: 0.6;
    }

    /* === BODY (sidebar + tree) === */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #12121f;
      border-right: 1px solid #2a2a3a;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-section h2 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #1a1a2a;
    }

    .sidebar-empty {
      font-size: 12px;
      color: #444;
      font-style: italic;
      padding: 4px 0;
    }

    /* Active click buttons */
    .active-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid;
      background: transparent;
      width: 100%;
      text-align: left;
      margin-bottom: 6px;
      transition: transform 0.08s;
      position: relative;
      overflow: hidden;
    }

    .active-btn:active { transform: scale(0.96); }

    .active-btn .click-value {
      font-size: 12px;
      opacity: 0.8;
    }

    /* Generator / multiplier / boost list items */
    .prod-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      background: #1a1a2e;
      margin-bottom: 4px;
    }

    .prod-item .prod-name {
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }

    .prod-item .prod-value {
      font-weight: 600;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .prod-total {
      display: flex;
      justify-content: space-between;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      border-top: 1px solid #2a2a3a;
      margin-top: 4px;
    }

    /* === MAIN (controls + tree) === */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #0f0f1a;
      border-bottom: 1px solid #1a1a2a;
      flex-shrink: 0;
    }

    .controls .stats {
      margin-left: auto;
      font-size: 12px;
      color: #666;
    }

    .click-multiplier {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
    }

    .click-multiplier input[type="range"] {
      width: 80px;
      accent-color: #5dde5d;
    }

    .click-multiplier .click-val {
      color: #5dde5d;
      font-weight: 600;
      min-width: 32px;
    }

    .toggle-group {
      display: flex;
      gap: 2px;
      background: #1a1a2e;
      border-radius: 6px;
      padding: 2px;
    }

    .toggle-btn {
      padding: 4px 12px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn.active { background: #2a2a4a; color: #fff; }
    .toggle-btn:hover:not(.active) { color: #bbb; }

    /* === TREE === */
    .tree-container {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: auto;
      padding: 16px;
    }

    .type-column {
      flex: 0 0 300px;
      min-width: 280px;
    }

    .type-header {
      text-align: center;
      padding: 8px 14px;
      margin: 0 6px 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .type-header .subtitle {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      opacity: 0.7;
      margin-top: 2px;
    }

    .node-list {
      padding: 0 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .tier-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 10px 3px;
      border-top: 1px solid #1a1a2a;
      margin-top: 6px;
    }
    .tier-label:first-child { border-top: none; margin-top: 0; }

    /* Collapsible unlocked section */
    .unlocked-group {
      border: 1px solid #1a2a1a;
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .unlocked-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 6px 10px;
      background: #121a12;
      border: none;
      color: #4a7a4a;
      font-size: 11px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }

    .unlocked-toggle:hover { background: #162016; }

    .unlocked-toggle .arrow {
      font-size: 10px;
      transition: transform 0.15s;
    }

    .unlocked-toggle.collapsed .arrow {
      transform: rotate(-90deg);
    }

    .unlocked-contents {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 6px 6px;
    }

    .unlocked-contents.collapsed {
      display: none;
    }

    /* Compact unlocked node when inside the group */
    .unlocked-group .node.unlocked {
      padding: 4px 10px;
      background: #121a12;
      border-color: #1a2a1a;
    }

    .unlocked-group .node.unlocked .node-top {
      margin-bottom: 0;
    }

    .unlocked-group .node.unlocked .node-desc,
    .unlocked-group .node.unlocked .node-flavor,
    .unlocked-group .node.unlocked .node-prereq,
    .unlocked-group .node.unlocked .node-era,
    .unlocked-group .node.unlocked .node-meta {
      display: none;
    }

    .unlocked-group .node.unlocked .node-effects {
      margin-top: 2px;
    }

    .unlocked-group .node.unlocked .node-effect {
      font-size: 9px;
    }

    /* === NODES === */
    .node {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: default;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    /* Unlocked: purchased, done */
    .node.unlocked {
      border-color: #3a6a3a;
      background: #162016;
    }

    /* Available but can't afford: prereqs met, waiting on energy */
    .node.available {
      border-color: #3a3a30;
      background: #1a1a18;
      cursor: not-allowed;
    }

    .node.available .node-name { color: #998; }
    .node.available .node-desc { color: #665; }
    .node.available .node-flavor { color: #443; }

    /* Available AND affordable: ready to buy */
    .node.available.affordable {
      border-color: #5a9a3a;
      background: #1a2a14;
      box-shadow: 0 0 14px rgba(93, 222, 93, 0.15);
      cursor: pointer;
    }

    .node.available.affordable .node-name { color: #e0e0e0; }
    .node.available.affordable .node-desc { color: #888; }
    .node.available.affordable .node-flavor { color: #555; }

    .node.available.affordable:hover {
      border-color: #7aba5a;
      box-shadow: 0 0 20px rgba(93, 222, 93, 0.25);
      transform: translateX(2px);
    }

    /* Locked: prereqs not met */
    .node.locked {
      opacity: 0.2;
      filter: grayscale(0.8);
    }

    .node.locked .node-name { color: #555; }

    .node.hidden { display: none; }

    .node-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .node-category {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .cat-generator   { background: #1a3a1a; color: #5dde5d; }
    .cat-multiplier  { background: #3a3a1a; color: #dede5d; }
    .cat-discovery   { background: #1a1a3a; color: #5d5dde; }
    .cat-instrument  { background: #3a1a3a; color: #de5dde; }
    .cat-gate        { background: #3a2a1a; color: #dea05d; }
    .cat-landmark    { background: #3a1a1a; color: #de5d5d; }
    .cat-active      { background: #1a3a3a; color: #5ddede; }

    .node-name {
      font-weight: 600;
      font-size: 13px;
      flex: 1;
    }

    .node-check { font-size: 13px; color: #5dde5d; }

    .node-desc {
      font-size: 11px;
      color: #888;
      line-height: 1.3;
    }

    .node-flavor {
      font-size: 10px;
      color: #555;
      font-style: italic;
      margin-top: 3px;
    }

    .node-meta {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .node-cost {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: #0f0f1a;
      border: 1px solid #2a2a3a;
      font-variant-numeric: tabular-nums;
    }

    .node-cost.can-afford { color: #5dde5d; border-color: #2a4a2a; }
    .node-cost.cant-afford { color: #de5d5d; border-color: #4a2a2a; }

    .node-prereq {
      font-size: 10px;
      color: #666;
      margin-top: 3px;
    }
    .node-prereq .cross-type { color: #dea05d; }

    .node-effects {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .node-effect { font-size: 10px; color: #6a6; }
    .node-effect.unlock-effect { color: #da5; font-weight: 600; }
    .node-effect.boost-effect { color: #5ad; }

    .node-era {
      font-size: 9px;
      color: #444;
      position: absolute;
      top: 8px;
      right: 10px;
    }

    /* Cost progress bar on available nodes */
    .cost-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      transition: width 0.2s;
    }

    /* Floating click numbers */
    .click-float {
      position: fixed;
      font-weight: 700;
      font-size: 16px;
      pointer-events: none;
      z-index: 1000;
      animation: floatUp 0.7s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-35px); }
    }

    /* Reset button */
    .reset-btn {
      background: none;
      border: 1px solid #3a2020;
      color: #884444;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .reset-btn:hover { border-color: #5a3030; color: #aa5555; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="./" style="color:#F4D03F">&larr; Design Tools</a> &middot;
    <a href="counters.html">Counter Matrix</a>
    <a href="combinations.html">Combinations</a>
    <a href="effects.html">Effect Space</a>
    <a href="schools.html">Wizard Schools</a>
    <a href="scientists.html">Scientists</a>
    <a href="equipment.html">Units &amp; Instruments</a>
    <a href="prototype.html">Game Prototype</a>
  </div>

  <div id="error"></div>
  <div id="loading">Loading progression tree...</div>

  <div class="app" id="app">
    <!-- Resource bar -->
    <div class="resource-bar" id="resource-bar"></div>

    <div class="app-body">
      <!-- Sidebar: production panel -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section" id="section-active">
          <h2>Click to Generate</h2>
          <div id="active-buttons"></div>
        </div>
        <div class="sidebar-section" id="section-generators">
          <h2>Generators</h2>
          <div id="generator-list"></div>
        </div>
        <div class="sidebar-section" id="section-multipliers">
          <h2>Multipliers</h2>
          <div id="multiplier-list"></div>
        </div>
        <div class="sidebar-section" id="section-boosts">
          <h2>Cross-Type Boosts</h2>
          <div id="boost-list"></div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="main">
        <div class="controls">
          <div class="toggle-group">
            <button class="toggle-btn active" data-mode="all">Show All</button>
            <button class="toggle-btn" data-mode="available">Show Available</button>
          </div>
          <div class="toggle-group">
            <button class="toggle-btn active" data-detail="full">Full</button>
            <button class="toggle-btn" data-detail="compact">Compact</button>
          </div>
          <div class="click-multiplier">
            <label>Click:</label>
            <input type="range" id="click-mult" min="0" max="6" value="0">
            <span class="click-val" id="click-mult-val">x1</span>
          </div>
          <span class="stats" id="stats"></span>
          <button class="reset-btn" id="reset-btn">Reset</button>
        </div>

        <div class="tree-container" id="tree"></div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1/dist/sql-wasm.js"></script>
  <script src="progression.js"></script>
</body>
</html>
