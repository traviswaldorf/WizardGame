<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizard Game — 3D Skill Tree</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .nav {
      text-align: center;
      padding: 6px;
      background: #12121f;
      border-bottom: 1px solid #1a1a2a;
      flex-shrink: 0;
    }
    .nav a { color: #7ab8f5; text-decoration: none; font-size: 11px; margin: 0 8px; }
    .nav a:hover { text-decoration: underline; }

    #error {
      display: none; background: #3b1a1a; border: 1px solid #E74C3C;
      color: #f5a5a5; padding: 16px 20px; border-radius: 8px;
      text-align: center; margin: 20px; font-size: 14px;
    }

    #loading { text-align: center; padding: 60px; color: #666; font-size: 16px; }

    .app {
      display: none; flex-direction: column; flex: 1; overflow: hidden;
    }

    .controls {
      display: flex; align-items: center; gap: 14px;
      padding: 8px 16px; background: #0a0a15;
      border-bottom: 1px solid #1a1a2a; flex-shrink: 0; flex-wrap: wrap;
    }

    .xp-group { display: flex; align-items: center; gap: 4px; font-size: 12px; }
    .xp-label { font-weight: 600; min-width: 36px; }
    .xp-slider {
      width: 80px; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: #2a2a3a; border-radius: 2px; outline: none;
    }
    .xp-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; cursor: pointer;
    }
    .xp-value {
      font-variant-numeric: tabular-nums; min-width: 28px;
      text-align: right; font-size: 11px; color: #888;
    }

    .ctrl-btn {
      padding: 4px 12px; border: 1px solid #2a2a3a; background: #1a1a2e;
      color: #aaa; font-size: 11px; border-radius: 4px; cursor: pointer;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: #2a2a4a; color: #fff; }
    .ctrl-btn.active { background: #2a2a4a; color: #F39C12; border-color: #F39C12; }
    .ctrl-btn.reveal { color: #de5dde; border-color: #de5dde; }
    .ctrl-btn.reveal.active { background: #2a1a2e; }

    .controls .spacer { flex: 1; }
    .controls .stats { font-size: 11px; color: #555; }

    #three-container { flex: 1; position: relative; }
    #three-container canvas { display: block; }

    /* Tooltip */
    #tooltip {
      display: none; position: fixed; background: #12121f;
      border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px 14px;
      max-width: 280px; font-size: 12px; z-index: 1000;
      pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .tt-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .tt-cat {
      display: inline-block; font-size: 9px; padding: 1px 5px;
      border-radius: 3px; text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px;
    }
    .tt-desc { color: #888; margin-bottom: 3px; line-height: 1.3; }
    .tt-flavor { color: #555; font-style: italic; margin-bottom: 5px; font-size: 11px; }
    .tt-section { border-top: 1px solid #1a1a2a; padding-top: 4px; margin-top: 4px; }
    .tt-cost-badge {
      display: inline-block; padding: 0 4px; border-radius: 3px;
      font-size: 10px; border: 1px solid; margin: 1px 0;
    }
    .tt-effect { color: #6a6; font-size: 11px; margin: 1px 0; }
    .tt-effect.unlock { color: #da5; font-weight: 600; }
    .tt-gate { color: #dea05d; font-size: 11px; margin-top: 3px; }
    .tt-meta { color: #F39C12; font-size: 10px; margin-top: 3px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="./" style="color:#F4D03F">&larr; Design Tools</a> &middot;
    <a href="skill-tree.html">2D View (Cytoscape)</a>
    <a href="roguelike-progression.html">Roguelike Data</a>
    <a href="progression.html">Incremental Tree</a>
    <a href="schools.html">Schools</a>
  </div>

  <div id="error"></div>
  <div id="loading">Loading 3D skill tree...</div>

  <div class="app" id="app">
    <div class="controls" id="controls">
      <div class="xp-group" id="xp-sliders"></div>
      <div class="spacer"></div>
      <button class="ctrl-btn reveal" id="btn-reveal">Reveal Dark Side</button>
      <button class="ctrl-btn" id="btn-meta" title="Toggle meta-gated branches">Meta Branches</button>
      <button class="ctrl-btn" id="btn-reset" title="Reset all investments">Reset</button>
      <span class="stats" id="stats"></span>
    </div>
    <div id="three-container"></div>
  </div>

  <div id="tooltip"></div>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1/dist/sql-wasm.js"></script>
  <script type="module" src="skill-tree-3d.js"></script>
</body>
</html>
